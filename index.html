<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-title" content="도아전기">
<title>도아전기</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
:root{--navy:#1A3A5C;--blue:#2E6DA4;--bg:#F2F5FA;--white:#fff;--border:#DDE6F0;--text:#1A3A5C;--text2:#758AA0;--red:#EF4444}
body{font-family:-apple-system,'Apple SD Gothic Neo','Malgun Gothic',sans-serif;background:var(--bg);color:var(--text);max-width:430px;margin:0 auto;min-height:100vh}
#login{display:flex;flex-direction:column;align-items:center;padding:60px 20px 40px;min-height:100vh;background:var(--navy)}
.login-logo{font-size:52px;margin-bottom:16px}
.login-title{font-size:24px;font-weight:700;color:#fff;margin-bottom:6px}
.login-sub{font-size:13px;color:rgba(255,255,255,.6);margin-bottom:36px}
.login-card{background:var(--white);border-radius:16px;width:100%;padding:20px;margin-bottom:12px}
.login-lbl{font-size:11px;font-weight:600;color:var(--text2);margin-bottom:10px;text-transform:uppercase;letter-spacing:.06em}
.login-member{display:flex;align-items:center;gap:12px;padding:12px 0;border-bottom:.5px solid var(--border);cursor:pointer}
.login-member:last-child{border-bottom:none}
.login-member:active{opacity:.7}
.login-av{width:38px;height:38px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:14px;font-weight:600}
.admin-btn{width:100%;padding:14px;border-radius:12px;background:rgba(255,255,255,.12);border:1px solid rgba(255,255,255,.25);color:#fff;font-size:15px;font-weight:600;cursor:pointer;font-family:inherit}
#hdr{background:var(--navy);color:#fff;padding:14px 16px 12px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:100}
#hdr h1{font-size:17px;font-weight:600}
#hdr p{font-size:11px;opacity:.65;margin-top:1px}
#hdr-right{display:flex;align-items:center;gap:8px}
#hdr-av{width:34px;height:34px;border-radius:50%;background:rgba(255,255,255,.15);display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:600}
#logout-btn{font-size:11px;color:rgba(255,255,255,.55);background:none;border:none;cursor:pointer;font-family:inherit}
#main{padding:14px 12px 80px}
#nav{position:fixed;bottom:0;left:50%;transform:translateX(-50%);width:100%;max-width:430px;background:var(--white);border-top:.5px solid var(--border);display:grid;grid-template-columns:repeat(5,1fr);padding:6px 0 12px;z-index:100}
.nb{display:flex;flex-direction:column;align-items:center;gap:2px;cursor:pointer;padding:4px 0;border:none;background:none;color:var(--text2);font-size:10px;font-family:inherit}
.nb svg{width:22px;height:22px;stroke:currentColor;fill:none;stroke-width:1.8;stroke-linecap:round;stroke-linejoin:round}
.nb.on{color:var(--navy);font-weight:600}
.card{background:var(--white);border:.5px solid var(--border);border-radius:12px;padding:14px;margin-bottom:10px}
.stats{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:14px}
.stat{background:var(--white);border:.5px solid var(--border);border-radius:10px;padding:12px 14px}
.stat-n{font-size:26px;font-weight:600;color:var(--navy)}
.stat-l{font-size:11px;color:var(--text2);margin-top:2px}
.badge{display:inline-block;padding:2px 8px;border-radius:20px;font-size:11px;font-weight:500}
.bi{background:#DBEAFE;color:#1D4ED8}.bd{background:#D1FAE5;color:#065F46}.bw{background:#FEF3C7;color:#92400E}.bh{background:#F1F5F9;color:#64748B}
.sec-hdr{display:flex;align-items:center;justify-content:space-between;margin-bottom:8px}
.sec-t{font-size:11px;font-weight:600;color:var(--text2);text-transform:uppercase;letter-spacing:.06em}
.sec-a{font-size:12px;color:var(--blue);font-weight:500;cursor:pointer;background:none;border:none;font-family:inherit}
.fab{position:fixed;bottom:76px;right:50%;transform:translateX(215px);width:52px;height:52px;border-radius:50%;background:var(--navy);color:#fff;border:none;cursor:pointer;font-size:28px;display:none;align-items:center;justify-content:center;box-shadow:0 4px 14px rgba(26,58,92,.4);z-index:99;line-height:1}
#sbg{display:none;position:fixed;inset:0;background:rgba(0,0,0,.45);z-index:200}
#sbg.on{display:block}
#sheet{position:fixed;bottom:0;left:50%;transform:translateX(-50%) translateY(100%);width:100%;max-width:430px;background:var(--white);border-radius:18px 18px 0 0;padding:20px 16px 28px;z-index:201;transition:transform .28s cubic-bezier(.32,.72,0,1);max-height:90vh;overflow-y:auto}
#sheet.on{transform:translateX(-50%) translateY(0)}
.sh{width:36px;height:4px;background:var(--border);border-radius:2px;margin:0 auto 16px}
.st{font-size:16px;font-weight:600;margin-bottom:16px;color:var(--navy)}
.fg{margin-bottom:12px}
.fl{font-size:12px;font-weight:500;color:var(--text2);margin-bottom:5px;display:block}
.fi{width:100%;padding:11px 12px;border:.5px solid var(--border);border-radius:8px;font-size:14px;font-family:inherit;color:var(--text);background:var(--white);outline:none;appearance:none;-webkit-appearance:none}
.fi:focus{border-color:var(--blue)}
.fr{display:grid;grid-template-columns:1fr 1fr;gap:8px}
.btn{width:100%;padding:13px;border-radius:10px;border:none;font-size:15px;font-weight:600;cursor:pointer;font-family:inherit}
.bp{background:var(--navy);color:#fff}.bp:active{background:var(--blue)}
.bg-r{background:transparent;color:var(--red);margin-top:8px}
.bs{padding:7px 14px;border-radius:8px;font-size:13px;font-weight:500;cursor:pointer;border:.5px solid var(--border);background:var(--white);color:var(--navy)}
#toast{position:fixed;top:80px;left:50%;transform:translateX(-50%);background:var(--navy);color:#fff;padding:10px 20px;border-radius:24px;font-size:13px;font-weight:500;z-index:300;opacity:0;transition:opacity .25s;pointer-events:none;white-space:nowrap}
#toast.on{opacity:1}
.li{background:var(--white);border:.5px solid var(--border);border-radius:12px;padding:13px 14px;margin-bottom:8px}
.lt{font-size:15px;font-weight:600;color:var(--text);margin-bottom:3px}
.ls{font-size:12px;color:var(--text2)}
.lm{display:flex;gap:6px;align-items:center;margin-top:5px;flex-wrap:wrap}
.la{display:flex;gap:6px;margin-top:10px;border-top:.5px solid var(--border);padding-top:10px;flex-wrap:wrap}
.av{width:40px;height:40px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:14px;font-weight:600;flex-shrink:0}
.empty{text-align:center;padding:48px 20px;color:var(--text2)}
.ei{font-size:40px;margin-bottom:10px;opacity:.35}
.fc{display:flex;gap:6px;margin-bottom:12px;overflow-x:auto;padding-bottom:2px}
.fc::-webkit-scrollbar{display:none}
.fcc{flex-shrink:0;padding:5px 13px;border-radius:20px;font-size:12px;font-weight:500;cursor:pointer;border:.5px solid var(--border);background:var(--white);color:var(--text2)}
.fcc.on{background:var(--navy);color:#fff;border-color:var(--navy)}
.loading{display:flex;align-items:center;justify-content:center;padding:48px;gap:10px;color:var(--text2);font-size:13px}
.spin{width:18px;height:18px;border:2.5px solid var(--border);border-top-color:var(--blue);border-radius:50%;animation:sp .7s linear infinite}
@keyframes sp{to{transform:rotate(360deg)}}
.qt{width:100%;border-collapse:collapse;font-size:13px}
.qt th{background:var(--navy);color:#fff;padding:8px 10px;text-align:left;font-weight:500}
.qt td{padding:8px 10px;border-bottom:.5px solid var(--border)}
.qt tr:nth-child(even) td{background:var(--bg)}
/* 사진 그리드 */
.photo-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:6px;margin-top:10px}
.photo-thumb{aspect-ratio:1;border-radius:8px;object-fit:cover;width:100%;cursor:pointer}
.photo-add{aspect-ratio:1;border-radius:8px;border:1.5px dashed var(--border);display:flex;flex-direction:column;align-items:center;justify-content:center;cursor:pointer;background:var(--bg);color:var(--text2);gap:4px;font-size:24px}
.photo-add span{font-size:11px}
/* 근태 캘린더 */
.att-wrap{background:var(--white);border-radius:12px;padding:14px;margin-bottom:10px}
.att-month-nav{display:flex;align-items:center;justify-content:space-between;margin-bottom:12px}
.att-month-title{font-size:15px;font-weight:600;color:var(--navy)}
.att-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:3px;margin-bottom:12px}
.att-dh{text-align:center;font-size:10px;font-weight:600;color:var(--text2);padding-bottom:4px}
.att-day{aspect-ratio:1;border-radius:7px;display:flex;flex-direction:column;align-items:center;justify-content:center;font-size:12px;cursor:pointer;border:.5px solid var(--border);background:var(--white);position:relative;user-select:none}
.att-day.worked{background:var(--navy);color:#fff;border-color:var(--navy)}
.att-day.overtime{background:var(--blue);color:#fff;border-color:var(--blue)}
.att-day.future{opacity:.3;cursor:default}
.att-day.blank{border-color:transparent;background:transparent;cursor:default}
.att-day.istoday{outline:2px solid var(--blue);outline-offset:1px}
.att-ot-dot{font-size:7px;position:absolute;bottom:2px;letter-spacing:-.5px;font-weight:700}
.att-summary{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-bottom:12px}
.att-sum{background:var(--bg);border-radius:8px;padding:10px;text-align:center}
.att-sum-n{font-size:20px;font-weight:700;color:var(--navy)}
.att-sum-l{font-size:11px;color:var(--text2);margin-top:2px}
.att-legend{display:flex;gap:12px;margin-bottom:10px;font-size:11px;color:var(--text2)}
.att-dot{width:10px;height:10px;border-radius:2px;flex-shrink:0}
/* 관리자 근태 바 */
.mem-att-row{display:flex;align-items:center;gap:10px;padding:10px 0;border-bottom:.5px solid var(--border);cursor:pointer}
.mem-att-row:last-child{border-bottom:none}
.att-bar-wrap{flex:1;height:5px;background:var(--border);border-radius:3px;overflow:hidden}
.att-bar-fill{height:100%;background:var(--navy);border-radius:3px}
</style>
</head>
<body>

<!-- 로그인 화면 -->
<div id="login" style="display:none">
  <div class="login-logo">⚡</div>
  <div class="login-title">도아전기</div>
  <div class="login-sub">나는 누구인가요?</div>
  <div class="login-card" id="login-list">
    <div class="login-lbl">팀원 선택</div>
    <div class="loading"><div class="spin"></div></div>
  </div>
  <button class="admin-btn" onclick="adminLogin()">🔐 관리자로 로그인</button>
</div>

<!-- 앱 화면 -->
<div id="app" style="display:none">
  <div id="hdr">
    <div><h1 id="hdr-t">도아전기</h1><p id="hdr-s">오늘도 안전하게!</p></div>
    <div id="hdr-right">
      <button id="logout-btn" onclick="logout()">로그아웃</button>
      <div id="hdr-av">한</div>
    </div>
  </div>
  <main id="main"><div class="loading"><div class="spin"></div>불러오는 중...</div></main>
  <nav id="nav">
    <button class="nb on" onclick="go('home')" id="nb-home">
      <svg viewBox="0 0 24 24"><path d="M3 9.5L12 3l9 6.5V20a1 1 0 01-1 1H4a1 1 0 01-1-1V9.5z"/><path d="M9 21V12h6v9"/></svg>홈
    </button>
    <button class="nb" onclick="go('sites')" id="nb-sites">
      <svg viewBox="0 0 24 24"><circle cx="12" cy="10" r="3"/><path d="M12 2C8.13 2 5 5.13 5 9c0 5.25 7 13 7 13s7-7.75 7-13c0-3.87-3.13-7-7-7z"/></svg>현장
    </button>
    <button class="nb" onclick="go('schedule')" id="nb-schedule">
      <svg viewBox="0 0 24 24"><rect x="3" y="4" width="18" height="18" rx="2"/><path d="M16 2v4M8 2v4M3 10h18"/></svg>일정
    </button>
    <button class="nb" onclick="go('quotes')" id="nb-quotes">
      <svg viewBox="0 0 24 24"><path d="M14 2H6a2 2 0 00-2 2v16a2 2 0 002 2h12a2 2 0 002-2V8z"/><path d="M14 2v6h6M16 13H8M16 17H8M10 9H8"/></svg>견적
    </button>
    <button class="nb" onclick="go('team')" id="nb-team">
      <svg viewBox="0 0 24 24"><path d="M17 21v-2a4 4 0 00-4-4H5a4 4 0 00-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 00-3-3.87M16 3.13a4 4 0 010 7.75"/></svg>팀원
    </button>
  </nav>
  <button class="fab" id="fab" onclick="openAdd()">+</button>
</div>

<div id="sbg" onclick="closeSheet()"></div>
<div id="sheet"><div class="sh"></div><div id="sc"></div></div>
<div id="toast"></div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.js"></script>
<script>
const SURL='https://rqxzazdpduosdjfikaon.supabase.co'
const SKEY='eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InJxeHphemRwZHVvc2RqZmlrYW9uIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzg5OTU2MzEsImV4cCI6MjA5NDU3MTYzMX0.qQsaX18gZv9rv2LwXT6hp22fRrG6-Gu4na-HDGoAssk'
const ADMIN_PIN='1234'
const COLORS=['#DBEAFE:#1D4ED8','#D1FAE5:#065F46','#FEE2E2:#991B1B','#EDE9FE:#5B21B6','#FEF9C3:#854D0E','#E0F2FE:#0369A1','#FCE7F3:#9D174D']
const db=supabase.createClient(SURL,SKEY)

let me=JSON.parse(localStorage.getItem('doa_user')||'null')
let screen='home',sites=[],members=[],schedules=[],quotes=[],sFilter='전체',wOff=0,editId=null,qNum=0
let attY=new Date().getFullYear(),attMo=new Date().getMonth()
let adminAttMemberId=null,adminAttMemberName=''

// ── 초기화
window.addEventListener('DOMContentLoaded',async()=>{
  if(me){showApp();await go('home')}
  else await showLogin()
})

// ── 로그인
async function showLogin(){
  document.getElementById('login').style.display='flex'
  document.getElementById('app').style.display='none'
  const{data}=await db.from('members').select('*').order('created_at')
  members=data||[]
  const list=document.getElementById('login-list')
  if(!members.length){
    list.innerHTML='<div class="login-lbl">팀원 선택</div><div style="text-align:center;color:var(--text2);padding:20px;font-size:13px">관리자로 먼저 로그인해서<br>팀원을 추가하세요</div>'
    return
  }
  list.innerHTML='<div class="login-lbl">팀원 선택</div>'+members.map((m,i)=>{
    const[bg,fg]=COLORS[i%COLORS.length].split(':')
    return `<div class="login-member" onclick="loginAs('${m.id}','${m.name}')">
      <div class="login-av" style="background:${bg};color:${fg}">${m.name[0]}</div>
      <div><div style="font-size:15px;font-weight:500;color:var(--text)">${m.name}</div><div style="font-size:12px;color:var(--text2)">${m.role||'내선전공'}</div></div>
    </div>`
  }).join('')
}
function loginAs(id,name){
  me={id,name,isAdmin:false}
  localStorage.setItem('doa_user',JSON.stringify(me))
  showApp();go('home')
}
function adminLogin(){
  const pin=prompt('관리자 PIN을 입력하세요\n(기본값: 1234)')
  if(pin===null)return
  if(pin===ADMIN_PIN){
    me={id:'admin',name:'관리자',isAdmin:true}
    localStorage.setItem('doa_user',JSON.stringify(me))
    showApp();go('home')
  }else toast('PIN이 틀렸어요',true)
}
function showApp(){
  document.getElementById('login').style.display='none'
  document.getElementById('app').style.display='block'
  document.getElementById('hdr-av').textContent=me.name[0]
}
function logout(){localStorage.removeItem('doa_user');me=null;showLogin()}

// ── 네비
async function go(s){
  screen=s
  document.querySelectorAll('.nb').forEach(b=>b.classList.remove('on'))
  document.getElementById('nb-'+s).classList.add('on')
  document.getElementById('fab').style.display=me?.isAdmin&&['sites','team','quotes'].includes(s)?'flex':'none'
  await render()
}
async function render(){
  document.getElementById('main').innerHTML='<div class="loading"><div class="spin"></div>불러오는 중...</div>'
  if(screen==='home')await rHome()
  else if(screen==='sites')await rSites()
  else if(screen==='schedule')await rSchedule()
  else if(screen==='quotes')await rQuotes()
  else if(screen==='team')await rTeam()
}

// ── 유틸
function toast(msg,err=false){const t=document.getElementById('toast');t.textContent=msg;t.style.background=err?'#E74C3C':'#1A3A5C';t.classList.add('on');setTimeout(()=>t.classList.remove('on'),2200)}
function openSheet(html){document.getElementById('sc').innerHTML=html;document.getElementById('sbg').classList.add('on');document.getElementById('sheet').classList.add('on')}
function closeSheet(){document.getElementById('sbg').classList.remove('on');document.getElementById('sheet').classList.remove('on');editId=null}
function openAdd(){if(screen==='sites')showSiteForm();else if(screen==='team')showMemberForm();else if(screen==='quotes')showQuoteForm()}
function v(id){return document.getElementById(id)?.value?.trim()||''}
function bc(s){return s==='진행중'?'bi':s==='완료'?'bd':s==='대기중'?'bw':'bh'}
function today(){return new Date().toISOString().slice(0,10)}
function fd(d){return d.toISOString().slice(0,10)}
function pad(n){return String(n).padStart(2,'0')}
function getWeek(off){const d=new Date();d.setDate(d.getDate()-d.getDay()+off*7);return Array.from({length:7},(_,i)=>{const x=new Date(d);x.setDate(d.getDate()+i);return x})}

// ══════════════ 홈 ══════════════
async function rHome(){
  const[sr,mr,scr]=await Promise.all([
    db.from('sites').select('*').order('created_at',{ascending:false}),
    db.from('members').select('*'),
    db.from('schedules').select('*,site:sites(name),member:members(name)').eq('work_date',today())
  ])
  sites=sr.data||[];members=mr.data||[];schedules=scr.data||[]
  const d=new Date(),days=['일','월','화','수','목','금','토']
  document.getElementById('hdr-t').textContent='도아전기'
  document.getElementById('hdr-s').textContent=`${d.getMonth()+1}월 ${d.getDate()}일 ${days[d.getDay()]}요일`
  const ts=schedules.reduce((a,s)=>{
    if(!a.find(x=>x.sid===s.site_id))a.push({sid:s.site_id,sn:s.site?.name||'',ms:[]})
    a.find(x=>x.sid===s.site_id).ms.push(s.member?.name||'')
    return a
  },[])
  document.getElementById('main').innerHTML=`
    <div style="background:${me.isAdmin?'#FEF3C7':'#E8F0F8'};border-radius:10px;padding:10px 14px;margin-bottom:14px;font-size:13px;color:${me.isAdmin?'#92400E':'var(--navy)'}">
      ${me.isAdmin?'🔐 관리자 모드로 로그인됐어요':'👤 <b>'+me.name+'</b>님으로 로그인됐어요'}
    </div>
    <div class="stats">
      <div class="stat"><div class="stat-n">${sites.filter(s=>s.status==='진행중').length}</div><div class="stat-l">진행중 현장</div></div>
      <div class="stat"><div class="stat-n">${members.length}</div><div class="stat-l">팀원 수</div></div>
      <div class="stat"><div class="stat-n">${schedules.length}</div><div class="stat-l">오늘 투입</div></div>
      <div class="stat"><div class="stat-n">${sites.filter(s=>s.status==='대기중').length}</div><div class="stat-l">대기중 현장</div></div>
    </div>
    <div class="sec-hdr"><div class="sec-t">오늘의 현장</div><button class="sec-a" onclick="go('schedule')">일정 보기</button></div>
    ${ts.length?ts.map(s=>`<div class="card"><div style="font-size:15px;font-weight:600">${s.sn}</div><div style="font-size:12px;color:var(--text2);margin-top:4px">투입: ${s.ms.join(' · ')}</div></div>`).join(''):'<div class="card"><div style="text-align:center;color:var(--text2);font-size:13px;padding:8px 0">오늘 배정된 일정이 없어요</div></div>'}
    <div class="sec-hdr" style="margin-top:4px"><div class="sec-t">최근 현장</div><button class="sec-a" onclick="go('sites')">전체보기</button></div>
    ${sites.slice(0,3).map(s=>`<div class="li"><div class="lt">${s.name}</div><div class="lm"><span class="badge ${bc(s.status)}">${s.status}</span><span class="ls">${s.client||''}</span></div></div>`).join('')||'<div class="empty"><div class="et">현장을 추가해보세요</div></div>'}
  `
}

// ══════════════ 현장 ══════════════
async function rSites(){

        <div class="la">

// ── 현장 사진/파일
async function openSiteFiles(siteId,siteName){
  openSheet(`<div class="st">${siteName} — 현장 사진</div><div class="loading"><div class="spin"></div></div>`)
  const{data}=await db.from('site_files').select('*').eq('site_id',siteId).order('created_at',{ascending:false})
  const files=data||[]
  document.getElementById('sc').innerHTML=`
    <div class="st">${siteName} — 현장 사진</div>
    <div class="photo-grid">
      <div class="photo-add" onclick="document.getElementById('fi-${siteId}').click()">
        <span>📷</span><span>사진 추가</span>
      </div>
      <input type="file" id="fi-${siteId}" accept="image/*" multiple style="display:none" onchange="uploadPhotos('${siteId}','${siteName}',this)">
      ${files.map(f=>`
        <div style="position:relative">
          <img class="photo-thumb" src="${f.file_data}" onclick="viewPhoto('${f.file_data}','${f.file_name||''}')">
          ${me.isAdmin?`<button onclick="delFile('${f.id}','${siteId}','${siteName}')" style="position:absolute;top:4px;right:4px;background:rgba(0,0,0,.6);border:none;color:#fff;border-radius:50%;width:22px;height:22px;font-size:12px;cursor:pointer">×</button>`:''}
        </div>`).join('')}
    </div>
    ${!files.length?'<div style="text-align:center;color:var(--text2);font-size:13px;padding:24px 0;margin-top:8px">아직 사진이 없어요<br><span style="font-size:11px;opacity:.7">📷 버튼으로 추가하세요</span></div>':''}
    <div id="up-prog" style="display:none;margin-top:14px"><div class="loading"><div class="spin"></div>업로드 중...</div></div>
  `
}

async function uploadPhotos(siteId,siteName,input){
  const files=Array.from(input.files);if(!files.length)return
  document.getElementById('up-prog').style.display='block'
  for(const file of files){
    const b64=await compressImg(file)
    await db.from('site_files').insert({site_id:siteId,file_name:file.name,file_data:b64,file_type:file.type})
  }
  toast(`${files.length}장 업로드 완료`)
  openSiteFiles(siteId,siteName)
}

function compressImg(file){
  return new Promise(res=>{
    const img=new Image(),url=URL.createObjectURL(file)
    img.onload=()=>{
      const max=900,c=document.createElement('canvas')
      let w=img.width,h=img.height
      if(w>max){h=Math.round(h*max/w);w=max}
      if(h>max){w=Math.round(w*max/h);h=max}
      c.width=w;c.height=h
      c.getContext('2d').drawImage(img,0,0,w,h)
      URL.revokeObjectURL(url);res(c.toDataURL('image/jpeg',.78))
    };img.src=url
  })
}

function viewPhoto(src,name){openSheet(`<div class="st">${name||'사진'}</div><img src="${src}" style="width:100%;border-radius:10px">`)}

async function delFile(id,siteId,siteName){
  if(!confirm('이 사진을 삭제할까요?'))return
  await db.from('site_files').delete().eq('id',id)
  toast('삭제했어요');openSiteFiles(siteId,siteName)
}

  const data={name,client:v('f-client'),address:v('f-addr'),phone:v('f-phone'),start_date:v('f-start')||null,end_date:v('f-end')||null,status:v('f-status'),memo:v('f-memo')}
  if(editId){await db.from('sites').update(data).eq('id',editId);toast('수정됐어요')}
  else{await db.from('sites').insert(data);toast('추가됐어요')}

// ══════════════ 일정 (월간) ══════════════
let scY=new Date().getFullYear(),scMo=new Date().getMonth()

async function rSchedule(){
  document.getElementById('hdr-t').textContent='일정 관리'
  const[sr,mr]=await Promise.all([
    db.from('sites').select('id,name').eq('status','진행중'),
    db.from('members').select('*')
  ])
  sites=sr.data||[];members=mr.data||[]
  const from=`${scY}-${pad(scMo+1)}-01`
  const to=`${scY}-${pad(scMo+1)}-${new Date(scY,scMo+1,0).getDate()}`
  const{data:sc}=await db.from('schedules').select('*,site:sites(name),member:members(name)').gte('work_date',from).lte('work_date',to)
  schedules=sc||[]
  const days=['일','월','화','수','목','금','토']
  const dim=new Date(scY,scMo+1,0).getDate()
  const firstDay=new Date(scY,scMo,1).getDay()
  const td=today()
  document.getElementById('hdr-s').textContent=`${scY}년 ${scMo+1}월`

  // 날짜별 배정 요약
  const byDate={}
  schedules.forEach(s=>{if(!byDate[s.work_date])byDate[s.work_date]=[];byDate[s.work_date].push(s)})

  document.getElementById('main').innerHTML=`
    <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:12px">
      <button class="bs" onclick="scMo=scMo>0?scMo-1:11;if(scMo===11)scY--;rSchedule()">◀</button>
      <div style="font-size:15px;font-weight:600;color:var(--navy)">${scY}년 ${scMo+1}월</div>
      <button class="bs" onclick="scMo=scMo<11?scMo+1:0;if(scMo===0)scY++;rSchedule()">▶</button>
    </div>

    <div style="background:var(--white);border:.5px solid var(--border);border-radius:12px;padding:10px;margin-bottom:14px">
      <div style="display:grid;grid-template-columns:repeat(7,1fr);gap:2px;margin-bottom:6px">
        ${days.map((d,i)=>`<div style="text-align:center;font-size:10px;font-weight:600;color:${i===0?'#EF4444':i===6?'#2E6DA4':'var(--text2)'};padding-bottom:4px">${d}</div>`).join('')}
      </div>
      <div style="display:grid;grid-template-columns:repeat(7,1fr);gap:2px">
        ${Array(firstDay).fill('<div></div>').join('')}
        ${Array.from({length:dim},(_,i)=>{
          const day=i+1
          const dstr=`${scY}-${pad(scMo+1)}-${pad(day)}`
          const isT=dstr===td
          const isSun=new Date(scY,scMo,day).getDay()===0
          const isSat=new Date(scY,scMo,day).getDay()===6
          const daySchs=byDate[dstr]||[]
          return `<div style="min-height:52px;border-radius:6px;padding:3px;background:${isT?'#EEF4FF':'transparent'};border:${isT?'.5px solid var(--blue)':'.5px solid transparent'};cursor:${me.isAdmin?'pointer':'default'}"${me.isAdmin?` onclick="openScAdd('${dstr}')"`:''}> 
            <div style="font-size:11px;font-weight:${isT?700:400};color:${isT?'var(--blue)':isSun?'#EF4444':isSat?'#2E6DA4':'var(--text)'};text-align:center;margin-bottom:2px">${day}</div>
            ${daySchs.slice(0,2).map(s=>`<div style="background:var(--navy);color:#fff;border-radius:2px;padding:1px 3px;font-size:8px;margin-bottom:1px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${s.member?.name||'?'}</div>`).join('')}
            ${daySchs.length>2?`<div style="font-size:8px;color:var(--text2);text-align:center">+${daySchs.length-2}</div>`:''}
            ${!daySchs.length&&me.isAdmin?`<div style="text-align:center;font-size:14px;color:var(--border);line-height:1;margin-top:2px">+</div>`:''}
          </div>`
        }).join('')}
      </div>
    </div>

    <div class="sec-hdr"><div class="sec-t">이번 달 팀원 배정 현황</div></div>
    ${members.length?members.map((m,i)=>{
      const my=schedules.filter(s=>s.member_id===m.id)
      const siteNames=[...new Set(my.map(s=>s.site?.name).filter(Boolean))]
      const[bg,fg]=COLORS[i%COLORS.length].split(':')
      return `<div class="li" style="display:flex;align-items:center;gap:12px">
        <div class="av" style="background:${bg};color:${fg}">${m.name[0]}</div>
        <div style="flex:1">
          <div style="font-size:14px;font-weight:600">${m.name}</div>
          <div style="font-size:12px;color:var(--text2)">${my.length?`${my.length}일 배정 · ${siteNames.join(', ')}`:'이번 달 배정 없음'}</div>
        </div>
        <div style="font-size:13px;font-weight:600;color:var(--navy)">${my.length}일</div>
      </div>`
    }).join(''):`<div class="empty"><div style="font-size:14px">팀원을 먼저 추가하세요</div></div>`}
  `
}

function showQuoteForm(){
  qNum=0
  openSheet(`<div class="st">새 견적서</div>
    <div class="fg"><label class="fl">현장</label><select class="fi" id="f-qs" style="background:#fff"><option value="">선택 (선택사항)</option>${sites.map(s=>`<option value="${s.id}">${s.name}</option>`).join('')}</select></div>

  addQI();addQI();addQI()

function addQI(){
  qNum++;const n=qNum
  const d=document.createElement('div');d.id=`qi${n}`;d.style.marginBottom='8px'
  d.innerHTML=`<div style="display:grid;grid-template-columns:2fr 1fr 1.3fr auto;gap:5px;align-items:center"><input class="fi" placeholder="품명" id="qn${n}"><input class="fi" type="number" placeholder="수량" id="qq${n}" value="1" min="1"><input class="fi" type="number" placeholder="단가(원)" id="qp${n}"><button onclick="document.getElementById('qi${n}').remove()" style="background:none;border:none;color:var(--red);font-size:20px;cursor:pointer;padding:4px;line-height:1">×</button></div>`
  document.getElementById('qitems').appendChild(d)
}
async function saveQ(){
  const items=[];let total=0
  document.querySelectorAll('[id^="qi"]').forEach(el=>{
    const n=el.id.replace('qi','')
    const name=document.getElementById('qn'+n)?.value?.trim()
    const qty=parseInt(document.getElementById('qq'+n)?.value||1)
    const price=parseInt(document.getElementById('qp'+n)?.value||0)
    if(name&&price>0){items.push({name,qty,price,total:qty*price});total+=qty*price}
  })
  if(!items.length){toast('품목과 단가를 입력하세요',true);return}
  await db.from('quotes').insert({site_id:v('f-qs')||null,client:v('f-qc'),items,total,status:'작성중'})
  toast('견적서 저장됐어요');closeSheet();rQuotes()
}

  const items=q.items||[],vat=Math.round(q.total*.1)

    </div>
    ${me.isAdmin?`<button class="btn bg-r" onclick="delQ('${q.id}')">견적서 삭제</button>`:''}

async function updQS(id,status){await db.from('quotes').update({status}).eq('id',id);quotes=quotes.map(q=>q.id===id?{...q,status}:q);toast('상태 변경됐어요')}

  members=data||[]

    // 관리자: 이달 근태 현황 + 팀원 목록

    const from=`${y}-${pad(mo+1)}-01`,to=`${y}-${pad(mo+1)}-${new Date(y,mo+1,0).getDate()}`
    const{data:att}=await db.from('attendance').select('*').gte('work_date',from).lte('work_date',to)
    const attData=att||[]
    const wdays=new Date(y,mo+1,0).getDate()

    document.getElementById('main').innerHTML=`
      <div style="background:#FEF3C7;border-radius:10px;padding:10px 14px;margin-bottom:14px;font-size:12px;color:#92400E">🔐 관리자 전용 — 팀원 근태는 관리자만 볼 수 있어요</div>
      <div class="sec-hdr"><div class="sec-t">${now.getMonth()+1}월 근태 현황 (탭하면 상세보기)</div></div>
      <div class="card" style="padding:10px 14px;margin-bottom:14px">
        ${members.length?members.map((m,i)=>{
          const myAtt=attData.filter(a=>a.member_id===m.id)
          const worked=myAtt.length,ot=myAtt.filter(a=>a.overtime).length
          const[bg,fg]=COLORS[i%COLORS.length].split(':')
          return `<div class="mem-att-row" onclick="openAdminAtt('${m.id}','${m.name.replace(/'/g,'')}')">
            <div class="av" style="background:${bg};color:${fg};width:34px;height:34px;font-size:12px">${m.name[0]}</div>
            <div style="flex:1">
              <div style="display:flex;justify-content:space-between;margin-bottom:5px">
                <span style="font-size:13px;font-weight:600">${m.name}</span>
                <span style="font-size:11px;color:var(--text2)">${worked}일 출근 · 야근 ${ot}회</span>
              </div>
              <div class="att-bar-wrap"><div class="att-bar-fill" style="width:${Math.min(Math.round(worked/wdays*100),100)}%"></div></div>
            </div>
            <span style="font-size:14px;color:var(--text2);margin-left:6px">›</span>
          </div>`
        }).join(''):`<div style="text-align:center;color:var(--text2);padding:16px;font-size:13px">팀원을 추가하세요</div>`}
      </div>
      <div class="sec-hdr"><div class="sec-t">팀원 목록</div></div>
      ${members.map((m,i)=>{
        const[bg,fg]=COLORS[i%COLORS.length].split(':')
        return `<div class="li"><div style="display:flex;align-items:center;gap:12px">
          <div class="av" style="background:${bg};color:${fg}">${m.name[0]}</div>
          <div style="flex:1"><div style="font-size:15px;font-weight:600">${m.name}</div><div style="font-size:12px;color:var(--text2)">${m.role||'내선전공'}${m.phone?' · '+m.phone:''}</div></div>
          ${m.phone?`<a href="tel:${m.phone}" style="font-size:22px;text-decoration:none">📞</a>`:''}
        </div><div class="la">
          <button class="bs" onclick="editMem('${m.id}')">✏️ 수정</button>
          <button class="bs" style="color:var(--red)" onclick="delMem('${m.id}')">삭제</button>
        </div></div>`
      }).join('')||`<div class="empty"><div class="ei">👷</div><div style="font-size:14px">팀원이 없어요</div></div>`}
    `
  } else {
    // 일반 팀원: 본인 근태 캘린더
    await renderMyAttendance()
  }
}

// 팀원 본인 근태
async function renderMyAttendance(){
  const from=`${attY}-${pad(attMo+1)}-01`,to=`${attY}-${pad(attMo+1)}-${new Date(attY,attMo+1,0).getDate()}`
  const{data}=await db.from('attendance').select('*').eq('member_id',me.id).gte('work_date',from).lte('work_date',to)
  const att=data||[]
  document.getElementById('main').innerHTML=`
    <div style="background:#E8F0F8;border-radius:10px;padding:10px 14px;margin-bottom:14px;font-size:12px;color:var(--navy)">
      📅 날짜를 탭해서 출근 체크하세요 &nbsp;·&nbsp; 한 번 더 탭하면 야근, 다시 탭하면 취소
    </div>
    ${buildAttCalendar(att,attY,attMo,true)}
  `
}

// 관리자: 팀원 근태 상세
async function openAdminAtt(memberId,memberName){
  adminAttMemberId=memberId;adminAttMemberName=memberName
  const y=attY,mo=attMo
  const from=`${y}-${pad(mo+1)}-01`,to=`${y}-${pad(mo+1)}-${new Date(y,mo+1,0).getDate()}`
  const{data}=await db.from('attendance').select('*').eq('member_id',memberId).gte('work_date',from).lte('work_date',to)
  const att=data||[]
  openSheet(`<div class="st">${memberName} 근태 상세</div>${buildAttCalendar(att,y,mo,false,memberId)}`)
}

function buildAttCalendar(att,y,mo,editable,memberId=null){
  const dim=new Date(y,mo+1,0).getDate()
  const firstDay=new Date(y,mo,1).getDay()
  const days=['일','월','화','수','목','금','토']
  const td=today()
  const worked=att.length,ot=att.filter(a=>a.overtime).length
  const navFn=editable
    ?`(d)=>{attY=d.y;attMo=d.mo;renderMyAttendance()}`
    :`(d)=>{attY=d.y;attMo=d.mo;openAdminAtt('${memberId||adminAttMemberId}','${adminAttMemberName}')}`

  return `<div class="att-wrap">
    <div class="att-month-nav">
      <button class="bs" style="padding:6px 10px" onclick="(${navFn})({y:${mo===0?y-1:y},mo:${mo===0?11:mo-1}})">◀</button>
      <div class="att-month-title">${y}년 ${mo+1}월</div>
      <button class="bs" style="padding:6px 10px" onclick="(${navFn})({y:${mo===11?y+1:y},mo:${mo===11?0:mo+1}})">▶</button>
    </div>
    <div class="att-summary">
      <div class="att-sum"><div class="att-sum-n">${worked}</div><div class="att-sum-l">출근일</div></div>
      <div class="att-sum"><div class="att-sum-n">${ot}</div><div class="att-sum-l">야근</div></div>
      <div class="att-sum"><div class="att-sum-n">${dim-worked}</div><div class="att-sum-l">미출근</div></div>
    </div>
    <div style="display:flex;gap:10px;margin-bottom:10px;font-size:11px;color:var(--text2)">
      <div style="display:flex;align-items:center;gap:4px"><div style="width:10px;height:10px;border-radius:2px;background:var(--navy)"></div>출근</div>
      <div style="display:flex;align-items:center;gap:4px"><div style="width:10px;height:10px;border-radius:2px;background:var(--blue)"></div>출근+야근</div>
    </div>
    <div class="att-grid">
      ${days.map(d=>`<div class="att-dh">${d}</div>`).join('')}
      ${Array(firstDay).fill('<div class="att-day blank"></div>').join('')}
      ${Array.from({length:dim},(_,i)=>{
        const day=i+1,dateStr=`${y}-${pad(mo+1)}-${pad(day)}`
        const rec=att.find(a=>a.work_date===dateStr)
        const isFuture=dateStr>td,isToday=dateStr===td
        const cls=[isFuture?'future':rec?.overtime?'overtime':rec?'worked':'',isToday?'istoday':''].join(' ').trim()
        const clickFn=editable&&!isFuture?`onclick="toggleAtt('${dateStr}')"`:`onclick=""`
        return `<div class="att-day ${cls}" ${clickFn}><span>${day}</span>${rec?.overtime?'<span class="att-ot-dot">야근</span>':''}</div>`
      }).join('')}
    </div>
  </div>`
}

async function toggleAtt(date){
  const{data,error}=await db.from('attendance').select('*').eq('member_id',me.id).eq('work_date',date)
  const rec=data?.[0]
  if(!rec){
    await db.from('attendance').insert({member_id:me.id,work_date:date,overtime:false})
    toast('✅ 출근 체크')
  }else if(!rec.overtime){
    await db.from('attendance').update({overtime:true}).eq('id',rec.id)
    toast('🌙 야근 체크')
  }else{
    await db.from('attendance').delete().eq('id',rec.id)
    toast('출근 취소')
  }
  await renderMyAttendance()
}

// 팀원 CRUD
function showMemberForm(m=null){
  editId=m?.id||null
  openSheet(`<div class="st">${m?'팀원 수정':'팀원 추가'}</div>
    <div class="fg"><label class="fl">이름 *</label><input class="fi" id="f-mn" placeholder="예) 김철수" value="${m?.name||''}"></div>
    <div class="fg"><label class="fl">직종</label><select class="fi" id="f-mr" style="background:#fff">${['내선전공','전기기사','현장소장','관리자'].map(r=>`<option ${(m?.role||'내선전공')===r?'selected':''}>${r}</option>`).join('')}</select></div>
    <div class="fg"><label class="fl">연락처</label><input class="fi" id="f-mp" type="tel" placeholder="010-0000-0000" value="${m?.phone||''}"></div>
    <button class="btn bp" onclick="saveMem()">${m?'저장':'추가'}</button>
    ${m?`<button class="btn bg-r" onclick="delMem('${m.id}')">팀원 삭제</button>`:''}
  `)
}
async function editMem(id){showMemberForm(members.find(m=>m.id===id))}
async function saveMem(){
  const name=document.getElementById('f-mn').value.trim()
  if(!name){toast('이름을 입력하세요',true);return}
  const data={name,role:v('f-mr'),phone:v('f-mp')}
  if(editId){await db.from('members').update(data).eq('id',editId);toast('수정됐어요')}
  else{await db.from('members').insert(data);toast('추가됐어요')}
  closeSheet();rTeam()
}
async function delMem(id){
  if(!confirm('이 팀원을 삭제할까요?'))return
  await db.from('members').delete().eq('id',id);toast('삭제했어요');closeSheet();rTeam()
}
</script>
